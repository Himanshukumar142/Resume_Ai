<!-- frontend/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RAG Resume Scorer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4 text-center">RAG-Based Resume Scorer & AI Suggestions</h2>
    
    <form id="uploadForm">
        <div class="mb-3">
            <label for="resume" class="form-label">Upload Resume (PDF/DOCX)</label>
            <input type="file" class="form-control" id="resume" name="resume" required>
        </div>
        <div class="mb-3">
            <label for="job_description" class="form-label">Upload Job Description (PDF/DOCX)</label>
            <input type="file" class="form-control" id="job_description" name="job_description" required>
        </div>
        <button type="submit" class="btn btn-primary">Get Score & Suggestions</button>
    </form>

    <div id="result" class="mt-5" style="display:none;">
        <h4>Resume Score: <span id="score"></span>%</h4>
        <h5 class="mt-3">Retrieved Tips:</h5>
        <ul id="tipsList"></ul>
        <h5 class="mt-3">AI Suggestions:</h5>
        <p id="aiSuggestions"></p>
    </div>
</div>

</body>
</html>
